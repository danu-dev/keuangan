<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>FinanceVoice — Personal Finance PWA</title>
  </head>
  <body>
    <!-- Premium Opaque Splash Screen Overlay -->
    <div id="splash-screen" style="position: fixed; inset: 0; z-index: 9999; background: #02130a; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease, visibility 0.4s ease;">
      <!-- Glowing Mic/Finance Logo -->
      <div style="position: relative; width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #10b981, #06b6d4); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 45px rgba(16, 185, 129, 0.4); margin-bottom: 20px; animation: splashPulse 2s infinite alternate;">
        <!-- Glowing Mic Vector -->
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" x2="12" y1="19" y2="22"/>
        </svg>
      </div>
      <h1 style="font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; font-size: 24px; font-weight: 800; color: #ffffff; margin: 0 0 6px; letter-spacing: -0.5px;">FinanceVoice</h1>
      <p style="font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 700; color: #10b981; margin: 0; text-transform: uppercase; letter-spacing: 2px; animation: splashBreathe 1.5s infinite alternate;">ASISTEN FINANSIAL SUARA</p>
      
      <style>
        @keyframes splashPulse {
          0% { transform: scale(0.96); box-shadow: 0 0 25px rgba(16, 185, 129, 0.3); }
          100% { transform: scale(1.04); box-shadow: 0 0 50px rgba(6, 182, 212, 0.6); }
        }
        @keyframes splashBreathe {
          0% { opacity: 0.5; }
          100% { opacity: 1; }
        }
      </style>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
